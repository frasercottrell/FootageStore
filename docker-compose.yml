services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3700:3700"
    environment:
      - DATABASE_URL=postgresql://footagestore:footagestore@db:5432/footagestore
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_TRUST_HOST=true
    volumes:
      - /mnt/user/appdata/footagestore/data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql://footagestore:footagestore@db:5432/footagestore
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - /mnt/user/appdata/footagestore/data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=footagestore
      - POSTGRES_PASSWORD=footagestore
      - POSTGRES_DB=footagestore
    volumes:
      - /mnt/user/appdata/footagestore/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U footagestore"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - /mnt/user/appdata/footagestore/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
